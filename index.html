<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Linear Triage</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f10;
      color: #e2e2e2;
      min-height: 100vh;
    }

    header {
      padding: 14px 24px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      background: #0f0f10;
      z-index: 10;
    }
    header h1 { font-size: 18px; font-weight: 600; color: #fff; flex: 0 0 auto; }
    .token-row { display: flex; gap: 8px; align-items: center; flex: 1; }
    input[type="text"], input[type="password"], select, textarea {
      background: #1a1a1e; border: 1px solid #333; color: #e2e2e2;
      border-radius: 6px; padding: 6px 10px; font-size: 13px; outline: none;
    }
    input[type="text"]:focus, input[type="password"]:focus, select:focus, textarea:focus { border-color: #5865f2; }
    #token-input { width: 280px; }

    button {
      background: #5865f2; color: #fff; border: none; border-radius: 6px;
      padding: 6px 14px; font-size: 13px; cursor: pointer; white-space: nowrap;
    }
    button:hover { background: #4752c4; }
    button:disabled { opacity: 0.5; cursor: default; }
    button.secondary { background: #1a1a1e; color: #888; border: 1px solid #333; }
    button.secondary:hover { background: #222; color: #e2e2e2; }

    .mode-tabs {
      display: flex; gap: 0; border-bottom: 1px solid #222;
      padding: 0 24px; background: #0f0f10;
    }
    .mode-tab {
      padding: 9px 18px; font-size: 13px; color: #666; cursor: pointer;
      border-bottom: 2px solid transparent; background: none; border-radius: 0;
    }
    .mode-tab:hover { color: #aaa; background: none; }
    .mode-tab.active { color: #818cf8; border-bottom-color: #818cf8; background: none; }

    .fetch-panel {
      display: none; padding: 12px 24px; border-bottom: 1px solid #1a1a1e;
      gap: 8px; align-items: flex-start; flex-wrap: wrap; background: #0f0f10;
    }
    .fetch-panel.active { display: flex; }

    .panel-col { display: flex; flex-direction: column; gap: 8px; width: 100%; }
    .panel-row { display: flex; gap: 8px; align-items: flex-start; }
    textarea { width: 100%; min-height: 72px; resize: vertical; font-family: monospace; font-size: 12px; line-height: 1.5; }
    .hint { font-size: 11px; color: #555; }

    .filter-bar {
      display: flex; gap: 8px; align-items: center;
      padding: 10px 24px; border-bottom: 1px solid #1a1a1e;
      background: #0f0f10; flex-wrap: wrap;
    }
    .filter-btn {
      background: #1a1a1e; border: 1px solid #2a2a2e; color: #aaa;
      border-radius: 20px; padding: 4px 14px; font-size: 12px; cursor: pointer;
    }
    .filter-btn:hover { background: #222; color: #e2e2e2; }
    .filter-btn.active { background: #5865f2; border-color: #5865f2; color: #fff; }
    #search { width: 200px; }
    .count { font-size: 12px; color: #555; margin-left: auto; }

    main { max-width: 900px; margin: 0 auto; padding: 16px 24px; }
    .issue-list { display: flex; flex-direction: column; gap: 8px; }

    .issue-card {
      background: #16161a; border: 1px solid #222; border-radius: 8px;
      padding: 12px 14px; display: flex; gap: 12px; align-items: flex-start;
      transition: border-color 0.15s;
    }
    .issue-card:hover { border-color: #333; }
    .issue-card.voted-up   { border-left: 3px solid #22c55e; }
    .issue-card.voted-down { border-left: 3px solid #ef4444; }

    .vote-col {
      display: flex; flex-direction: column; align-items: center;
      gap: 2px; flex: 0 0 auto; padding-top: 2px;
    }
    .vote-btn {
      background: none; border: 1px solid #2a2a2e; color: #555; border-radius: 4px;
      width: 28px; height: 24px; padding: 0; font-size: 13px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all 0.1s;
    }
    .vote-btn:hover { background: #222; color: #aaa; border-color: #444; }
    .vote-btn.up.active   { background: #14532d; border-color: #22c55e; color: #22c55e; }
    .vote-btn.down.active { background: #450a0a; border-color: #ef4444; color: #ef4444; }

    .issue-body { flex: 1; min-width: 0; }
    .issue-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
    .issue-id { font-size: 11px; color: #555; font-family: monospace; }
    .priority-dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto; }
    .state-badge {
      font-size: 10px; padding: 2px 7px; border-radius: 10px;
      background: #1e1e24; border: 1px solid #2a2a2e; color: #888; text-transform: capitalize;
    }
    .issue-title { font-size: 14px; color: #e2e2e2; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .issue-title a { color: inherit; text-decoration: none; }
    .issue-title a:hover { color: #818cf8; }
    .issue-desc { font-size: 12px; color: #666; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .issue-footer { display: flex; gap: 8px; margin-top: 5px; align-items: center; flex-wrap: wrap; }
    .label-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #1e1e2e; border: 1px solid #2e2e4e; color: #818cf8; }
    .assignee { font-size: 11px; color: #555; }
    .created { font-size: 11px; color: #444; margin-left: auto; }

    .empty   { text-align: center; color: #444; padding: 60px 0; font-size: 14px; }
    .loading { text-align: center; color: #555; padding: 40px 0; font-size: 14px; }
    .error-msg {
      background: #2a0a0a; border: 1px solid #ef4444; color: #f87171;
      border-radius: 6px; padding: 10px 14px; margin: 12px 24px 0; font-size: 13px;
    }
  </style>
</head>
<body>

<header>
  <h1>Linear Triage</h1>
  <div class="token-row">
    <input type="password" id="token-input" placeholder="Linear API token (lin_api_…)" autocomplete="off" />
    <button class="secondary" id="clear-votes-btn">Clear votes</button>
  </div>
</header>

<div class="mode-tabs">
  <button class="mode-tab active" data-mode="list">Issue list</button>
  <button class="mode-tab" data-mode="view">By view URL</button>
  <button class="mode-tab" data-mode="team">By team</button>
</div>

<!-- LIST MODE -->
<div class="fetch-panel active" id="panel-list">
  <div class="panel-col">
    <textarea id="issue-list-input" placeholder="Paste issue identifiers, one per line or comma-separated:&#10;YOU-21931&#10;YOU-21906, YOU-20423&#10;YOU-21787"></textarea>
    <div class="panel-row">
      <button id="fetch-list-btn">Load issues</button>
      <span class="hint">Accepts any separator — comma, newline, space. Ctrl+Enter to load.</span>
    </div>
  </div>
</div>

<!-- VIEW MODE -->
<div class="fetch-panel" id="panel-view">
  <div class="panel-col">
    <div class="panel-row">
      <input type="text" id="view-url-input" placeholder="Paste Linear view URL — https://linear.app/…/view/…" style="flex:1" />
      <button id="fetch-view-btn">Load view</button>
    </div>
    <span class="hint">Paste any Linear custom view or board URL. Issues are fetched with the view's current filters.</span>
  </div>
</div>

<!-- TEAM MODE -->
<div class="fetch-panel" id="panel-team">
  <input type="text" id="team-input" placeholder="Team key (e.g. YOU)" autocomplete="off" style="width:130px" />
  <select id="state-filter-fetch">
    <option value="">All states</option>
    <option value="Todo">Todo</option>
    <option value="In Progress">In Progress</option>
    <option value="In Review">In Review</option>
    <option value="Backlog" selected>Backlog</option>
    <option value="Done">Done</option>
    <option value="Cancelled">Cancelled</option>
  </select>
  <button id="fetch-team-btn">Fetch issues</button>
</div>

<div id="error-area"></div>

<div class="filter-bar">
  <button class="filter-btn active" data-vote="all">All</button>
  <button class="filter-btn" data-vote="up">👍 Up-voted</button>
  <button class="filter-btn" data-vote="down">👎 Down-voted</button>
  <button class="filter-btn" data-vote="none">Unsorted</button>
  <input type="text" id="search" placeholder="Search title…" />
  <span class="count" id="count"></span>
</div>

<main>
  <div id="list" class="issue-list">
    <p class="empty">Paste issue IDs, a view URL, or pick a team above, then load.</p>
  </div>
</main>

<script>
  const STORAGE_KEY = 'linear-triage-votes';
  const TOKEN_KEY   = 'linear-triage-token';
  const TEAM_KEY    = 'linear-triage-team';

  const tokenInput    = document.getElementById('token-input');
  const teamInput     = document.getElementById('team-input');
  const listInput     = document.getElementById('issue-list-input');
  const viewUrlInput  = document.getElementById('view-url-input');
  const fetchListBtn  = document.getElementById('fetch-list-btn');
  const fetchViewBtn  = document.getElementById('fetch-view-btn');
  const fetchTeamBtn  = document.getElementById('fetch-team-btn');
  const listEl        = document.getElementById('list');
  const errorArea     = document.getElementById('error-area');
  const countEl       = document.getElementById('count');
  const searchEl      = document.getElementById('search');
  const clearVotes    = document.getElementById('clear-votes-btn');
  const stateFetch    = document.getElementById('state-filter-fetch');

  let issues = [];
  let voteFilter = 'all';

  tokenInput.value = localStorage.getItem(TOKEN_KEY) || '';
  teamInput.value  = localStorage.getItem(TEAM_KEY)  || '';
  tokenInput.addEventListener('change', () => localStorage.setItem(TOKEN_KEY, tokenInput.value.trim()));
  teamInput.addEventListener('change',  () => localStorage.setItem(TEAM_KEY,  teamInput.value.trim()));

  document.querySelectorAll('.mode-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.fetch-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-' + tab.dataset.mode).classList.add('active');
    });
  });

  function getVotes() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; }
  }
  function setVote(id, val) {
    const v = getVotes();
    if (val === null) delete v[id]; else v[id] = val;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(v));
  }

  clearVotes.addEventListener('click', () => {
    if (confirm('Clear all votes?')) { localStorage.removeItem(STORAGE_KEY); renderList(); }
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      voteFilter = btn.dataset.vote;
      renderList();
    });
  });
  searchEl.addEventListener('input', renderList);

  const PRIORITY_COLORS = { 0: '#555', 1: '#ef4444', 2: '#f97316', 3: '#eab308', 4: '#22c55e' };
  const PRIORITY_NAMES  = { 0: 'No priority', 1: 'Urgent', 2: 'High', 3: 'Medium', 4: 'Low' };

  function relativeTime(iso) {
    const diff = Date.now() - new Date(iso).getTime();
    const d = Math.floor(diff / 86400000);
    if (d === 0) return 'today';
    if (d === 1) return 'yesterday';
    if (d < 30)  return `${d}d ago`;
    const m = Math.floor(d / 30);
    return m < 12 ? `${m}mo ago` : `${Math.floor(m / 12)}y ago`;
  }

  function renderList() {
    const votes = getVotes();
    const query = searchEl.value.trim().toLowerCase();
    const filtered = issues.filter(issue => {
      const vote = votes[issue.id] || null;
      if (voteFilter === 'up'   && vote !== 'up')  return false;
      if (voteFilter === 'down' && vote !== 'down') return false;
      if (voteFilter === 'none' && vote !== null)   return false;
      if (query && !issue.title.toLowerCase().includes(query) &&
                   !(issue.identifier || '').toLowerCase().includes(query)) return false;
      return true;
    });

    countEl.textContent = `${filtered.length} / ${issues.length}`;

    if (filtered.length === 0) {
      listEl.innerHTML = `<p class="empty">No issues match.</p>`;
      return;
    }

    listEl.innerHTML = filtered.map(issue => {
      const vote    = votes[issue.id] || null;
      const labels  = (issue.labels?.nodes || []).map(l => `<span class="label-tag">${l.name}</span>`).join('');
      const assignee = issue.assignee ? `<span class="assignee">@${issue.assignee.displayName}</span>` : '';
      const color   = PRIORITY_COLORS[issue.priority ?? 0];
      const pname   = PRIORITY_NAMES[issue.priority ?? 0];

      return `<div class="issue-card ${vote ? 'voted-' + vote : ''}" data-id="${issue.id}">
        <div class="vote-col">
          <button class="vote-btn up ${vote === 'up' ? 'active' : ''}" data-id="${issue.id}" data-dir="up" title="Up-vote">▲</button>
          <button class="vote-btn down ${vote === 'down' ? 'active' : ''}" data-id="${issue.id}" data-dir="down" title="Down-vote">▼</button>
        </div>
        <div class="issue-body">
          <div class="issue-meta">
            <span class="priority-dot" style="background:${color}" title="${pname}"></span>
            <span class="issue-id">${issue.identifier}</span>
            <span class="state-badge">${issue.state?.name || ''}</span>
          </div>
          <div class="issue-title">
            <a href="https://linear.app/issue/${issue.identifier}" target="_blank" rel="noopener">${issue.title}</a>
          </div>
          ${issue.description ? `<div class="issue-desc">${issue.description.slice(0, 120)}</div>` : ''}
          <div class="issue-footer">
            ${labels}${assignee}
            <span class="created">${relativeTime(issue.createdAt)}</span>
          </div>
        </div>
      </div>`;
    }).join('');

    listEl.querySelectorAll('.vote-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const id  = btn.dataset.id;
        const dir = btn.dataset.dir;
        const cur = getVotes()[id] || null;
        setVote(id, cur === dir ? null : dir);
        renderList();
      });
    });
  }

  const ISSUE_FIELDS = `id identifier title description priority createdAt updatedAt
    state { name }
    assignee { displayName }
    labels { nodes { name } }`;

  function getToken() {
    const t = tokenInput.value.trim();
    localStorage.setItem(TOKEN_KEY, t);
    return t;
  }

  async function gql(token, query) {
    const res = await fetch('https://api.linear.app/graphql', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': token },
      body: JSON.stringify({ query }),
    });
    const json = await res.json();
    if (json.errors) throw new Error(json.errors.map(e => e.message).join(', '));
    return json.data;
  }

  function setLoading(btn, text) { btn.disabled = true; btn.dataset.orig = btn.textContent; btn.textContent = text; }
  function clearLoading(btn)     { btn.disabled = false; btn.textContent = btn.dataset.orig || btn.textContent; }

  // ── LIST MODE ──────────────────────────────────────────────────────────────
  // Linear API does not support filtering by identifier string directly.
  // Instead we use batched aliased queries: `_0: issue(id: "YOU-1234") { ... }`
  // The `issue` resolver accepts both UUID and human identifier.
  fetchListBtn.addEventListener('click', fetchByList);
  listInput.addEventListener('keydown', e => { if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) fetchByList(); });

  async function fetchByList() {
    const token = getToken();
    if (!token) { showError('Please enter a Linear API token.'); return; }

    const ids = [...new Set(
      listInput.value.split(/[\s,;]+/).map(s => s.trim().toUpperCase()).filter(s => /^[A-Z]+-\d+$/.test(s))
    )];
    if (ids.length === 0) { showError('No valid issue identifiers found (expected format: YOU-1234)'); return; }

    clearError();
    listEl.innerHTML = `<p class="loading">Fetching ${ids.length} issue${ids.length > 1 ? 's' : ''}…</p>`;
    setLoading(fetchListBtn, 'Loading…');

    try {
      // Batch all lookups in one request using GraphQL aliases
      const aliasedQueries = ids.map((id, i) => `_${i}: issue(id: "${id}") { ${ISSUE_FIELDS} }`).join('\n');
      const data = await gql(token, `{ ${aliasedQueries} }`);

      // Preserve input order; null means not found
      const ordered = ids.map((id, i) => data[`_${i}`]).filter(Boolean);
      const missing  = ids.filter((_, i) => !data[`_${i}`]);

      if (missing.length) showError(`Not found: ${missing.join(', ')}`);
      else clearError();

      if (ordered.length === 0) { listEl.innerHTML = '<p class="empty">No issues found.</p>'; countEl.textContent = ''; return; }
      issues = ordered;
      renderList();
    } catch (err) {
      showError('Error: ' + err.message);
      listEl.innerHTML = '<p class="empty">Failed to load.</p>';
    } finally {
      clearLoading(fetchListBtn);
    }
  }

  // ── VIEW MODE ─────────────────────────────────────────────────────────────
  // Extracts view ID from a Linear custom view URL and fetches its issues.
  // URL pattern: https://linear.app/{workspace}/view/{viewId}?filter=...
  fetchViewBtn.addEventListener('click', fetchByView);
  viewUrlInput.addEventListener('keydown', e => { if (e.key === 'Enter') fetchByView(); });

  function extractViewId(url) {
    try {
      const u = new URL(url.trim());
      const m = u.pathname.match(/\/view\/([a-zA-Z0-9_-]+)/);
      return m ? m[1] : null;
    } catch { return null; }
  }

  async function fetchByView() {
    const token  = getToken();
    if (!token) { showError('Please enter a Linear API token.'); return; }

    const viewId = extractViewId(viewUrlInput.value);
    if (!viewId) { showError('Could not extract view ID from URL. Expected format: https://linear.app/…/view/{id}'); return; }

    clearError();
    listEl.innerHTML = '<p class="loading">Loading view…</p>';
    setLoading(fetchViewBtn, 'Loading…');

    try {
      const data = await gql(token, `{
        customView(id: "${viewId}") {
          name
          issues(first: 250, orderBy: updatedAt) {
            nodes { ${ISSUE_FIELDS} }
          }
        }
      }`);

      const view = data?.customView;
      if (!view) { showError('View not found or not accessible with this token.'); listEl.innerHTML = '<p class="empty">View not found.</p>'; return; }

      issues = view.issues?.nodes || [];
      if (issues.length === 0) { listEl.innerHTML = `<p class="empty">No issues in "${view.name}".</p>`; countEl.textContent = '0'; return; }
      renderList();
    } catch (err) {
      showError('Error: ' + err.message);
      listEl.innerHTML = '<p class="empty">Failed to load.</p>';
    } finally {
      clearLoading(fetchViewBtn);
    }
  }

  // ── TEAM MODE ──────────────────────────────────────────────────────────────
  fetchTeamBtn.addEventListener('click', fetchByTeam);

  async function fetchByTeam() {
    const token = getToken();
    const team  = teamInput.value.trim().toUpperCase();
    if (!token) { showError('Please enter a Linear API token.'); return; }
    if (!team)  { showError('Please enter a team key (e.g. YOU).'); return; }
    localStorage.setItem(TEAM_KEY, teamInput.value.trim());

    clearError();
    listEl.innerHTML = '<p class="loading">Fetching issues…</p>';
    setLoading(fetchTeamBtn, 'Loading…');

    const stateFilter = stateFetch.value ? `, filter: { state: { name: { eq: "${stateFetch.value}" } } }` : '';

    try {
      const data = await gql(token, `{
        team(id: "${team}") {
          issues(first: 250${stateFilter}, orderBy: updatedAt) {
            nodes { ${ISSUE_FIELDS} }
          }
        }
      }`);
      issues = data?.team?.issues?.nodes || [];
      if (issues.length === 0) { listEl.innerHTML = '<p class="empty">No issues found.</p>'; countEl.textContent = '0'; return; }
      renderList();
    } catch (err) {
      showError('Error: ' + err.message);
      listEl.innerHTML = '<p class="empty">Failed to load.</p>';
    } finally {
      clearLoading(fetchTeamBtn);
    }
  }

  function showError(msg) { errorArea.innerHTML = `<div class="error-msg">${msg}</div>`; }
  function clearError()   { errorArea.innerHTML = ''; }
</script>
</body>
</html>
